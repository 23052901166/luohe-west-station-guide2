<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>漯河西站候车系统管理后台</title>
  <style>
    body { padding: 20px; font-family: Arial, sans-serif; }
    h1 { color: #003366; }
    .form-group { margin: 15px 0; }
    label { display: inline-block; width: 120px; font-weight: bold; }
    input, select { padding: 8px; width: 200px; font-size: 16px; }
    button { 
      padding: 10px 20px; 
      background: #007bff; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #0056b3; }
    #message { margin-top: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>漯河西站 - 车次状态管理后台</h1>
  <div class="form-group">
    <label>车次号：</label>
    <input type="text" id="trainNo" placeholder="如G1990">
  </div>
  <div class="form-group">
    <label>状态：</label>
    <select id="trainStatus">
      <option value="正在候车">正在候车</option>
      <option value="正在检票">正在检票</option>
      <option value="晚点">晚点</option>
      <option value="停运">停运</option>
    </select>
  </div>
  <div class="form-group">
    <label>晚点分钟：</label>
    <input type="number" id="delayMinutes" placeholder="0" value="0">
  </div>
  <button onclick="updateTrainStatus()">提交修改</button>
  <div id="message"></div>

  <script>
    const GITHUB_USER = "23052901166";
    const REPO_NAME = "luohe-west-station-guide2";
    const DATA_PATH = "data/trains.json";
    // 这里需要你后面补充自己的GitHub Token
    const GITHUB_TOKEN = "你的GitHub Personal Access Token";

    async function updateTrainStatus() {
      const trainNo = document.getElementById("trainNo").value.trim();
      const status = document.getElementById("trainStatus").value;
      const delayMinutes = parseInt(document.getElementById("delayMinutes").value);
      const message = document.getElementById("message");

      if (!trainNo) {
        message.innerHTML = "<span style='color: red;'>请输入车次号</span>";
        return;
      }

      try {
        // 1. 读取当前车次数据
        const readResponse = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${DATA_PATH}`, {
          headers: { Authorization: `token ${GITHUB_TOKEN}` }
        });
        const readData = await readResponse.json();
        const trains = JSON.parse(atob(readData.content));

        if (!trains[trainNo]) {
          message.innerHTML = `<span style='color: red;'>车次${trainNo}不存在</span>`;
          return;
        }

        // 2. 更新状态
        trains[trainNo].status = status;
        trains[trainNo].delay_minutes = delayMinutes;
        const updatedContent = btoa(JSON.stringify(trains, null, 2));

        // 3. 提交到GitHub
        const updateResponse = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${DATA_PATH}`, {
          method: "PUT",
          headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: `更新车次${trainNo}状态为${status}`,
            content: updatedContent,
            sha: readData.sha
          })
        });

        if (updateResponse.ok) {
          message.innerHTML = `<span style='color: green;'>车次${trainNo}状态更新成功！所有屏幕将在30秒内同步</span>`;
        } else {
          message.innerHTML = `<span style='color: red;'>更新失败：${await updateResponse.text()}</span>`;
        }
      } catch (error) {
        message.innerHTML = `<span style='color: red;'>操作失败：${error.message}</span>`;
      }
    }
  </script>
</body>
</html>
