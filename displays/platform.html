<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>漯河西站3号站台候车屏</title>
  <style>
    body {
      background: #001a33;
      color: #ffffff;
      font-family: "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 20px;
    }
    .platform-title {
      font-size: 48px;
      font-weight: bold;
      color: #4cd964;
      margin-bottom: 20px;
    }
    .train-card {
      background: #003366;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .train-no {
      font-size: 42px;
      font-weight: bold;
    }
    .station-info {
      font-size: 28px;
      margin: 10px 0;
    }
    .departure-time {
      font-size: 36px;
      color: #ffcc00;
    }
    .landmark {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 4px;
      font-size: 24px;
      margin-right: 15px;
    }
    .landmark-blue { background: #007aff; }
    .landmark-green { background: #4cd964; }
    .status {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }
    .status-checking { color: #4cd964; }
    .status-waiting { color: #ffffff; }
    .status-delayed { color: #ff9500; }
    .status-stopped { color: #ff3b30; }
  </style>
</head>
<body>
  <div class="platform-title">漯河西站 3号站台候车屏</div>
  <div id="train-container"></div>

  <script>
    // 你的GitHub用户名和仓库名
    const GITHUB_USER = "23052901166";
    const REPO_NAME = "luohe-west-station-guide2";
    const DATA_PATH = "data/trains.json";
    const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${DATA_PATH}`;

    // 页面加载时和每30秒刷新一次数据
    window.onload = fetchTrainData;
    setInterval(fetchTrainData, 30000);

    async function fetchTrainData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const trainsJson = atob(data.content);
        const trains = JSON.parse(trainsJson);
        
        // 筛选当前站台（这里是3号站台）的车次
        const platformTrains = Object.values(trains).filter(t => t.platform === 3);
        renderTrains(platformTrains);
      } catch (error) {
        console.error("加载数据失败：", error);
        document.getElementById("train-container").innerHTML = 
          "<div style='color: red; font-size: 28px;'>数据加载失败，请检查网络</div>";
      }
    }

    function renderTrains(trains) {
      const container = document.getElementById("train-container");
      container.innerHTML = "";
      if (trains.length === 0) {
        container.innerHTML = "<div style='font-size: 28px;'>当前站台暂无车次</div>";
        return;
      }
      trains.forEach(train => {
        const statusClass = 
          train.status === "正在检票" ? "checking" :
          train.status === "晚点" ? "delayed" :
          train.status === "停运" ? "stopped" : "waiting";

        container.innerHTML += `
          <div class="train-card">
            <div class="train-no">${train.train_no}</div>
            <div class="station-info">${train.start_station} → ${train.end_station}</div>
            <div class="departure-time">开点：${train.departure_time} 
              ${train.delay_minutes > 0 ? `（晚点${train.delay_minutes}分钟）` : ""}
            </div>
            <div>
              <span class="landmark landmark-${train.landmark_color === '蓝色' ? 'blue' : 'green'}">
                ${train.landmark_color}地标
              </span>
              <span style="font-size:24px;">${train.carriage_direction}</span>
            </div>
            <div class="status status-${statusClass}">${train.status}</div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
